<!DOCTYPE html> 
<html lang="ru"> 
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Приглашение на свадьбу</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Шапка сайта (Экран приветствия) -->
    <header>
        <h2 id="guest-name" style="font-size: 2rem; font-weight: 300; margin-bottom: 10px; color: #8c7e74; font-style: italic;"></h2>
        <h1>Артур & Виктория</h1>
        <p>07.08.2026 — День нашей свадьбы</p>
    </header>

    <!-- Основной блок с информацией -->
    <main>
        <section>
            <h2>Место проведения</h2>
            <p>Ресторанный комплекс «Версаль», г. Уфа</p>
            <p>Начало банкета в 17:00</p>
        </section>
                <!-- Начало секции опроса -->
                <!-- Новая безопасная секция опроса -->
        <section class="rsvp-section">
            <h2>Подтверждение присутствия</h2>
            <p class="rsvp-subtitle">Пожалуйста, ответьте на вопросы ниже до 01.07.2026</p>

            <!-- Вставляем саму форму в виде чистого документа. Браузер поймет, что её заполняет реальный человек -->
            <div class="form-container">
                <iframe src="https://forms.gle/AGNwrPxbUibq9kY37" width="100%" height="900" frameborder="0" marginheight="0" marginwidth="0">Загрузка…</iframe>
            </div>
        </section>


    </main>
        <script>
        var submitted = false;

        document.getElementById('wedding-form').addEventListener('submit', function() {
            submitted = true;
        });

        function showSuccess() {
            document.getElementById('wedding-form').querySelectorAll('.form-group, .submit-btn').forEach(function(el) {
                el.style.display = 'none';
            });
            document.getElementById('success-message').style.display = 'block';
        }

        function initPersonalization() {
            const urlParams = new URLSearchParams(window.location.search);
            const guest = urlParams.get('p'); 
            
            if (guest) {
                const decodedName = decodeURIComponent(guest);
                document.getElementById('guest-name').innerText = decodedName + ",";
                document.getElementById('name').value = decodedName;
            }
        }

        // Запускаем персонализацию при старте
        initPersonalization();
    </script>


</body>
</html>
